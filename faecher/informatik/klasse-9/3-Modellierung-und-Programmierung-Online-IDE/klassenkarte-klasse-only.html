<!doctype html>
<html lang="de">

<head>
  <base href="https://klassenkarte.de/kdm/">

  <meta charset="utf-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Klassenkarte</title>
</head>

<body>
  <script src="https://klassenkarte.de/kdm/js/kdm_helper.js"></script>
  <script src="https://klassenkarte.de/kdm/js/kdm_model.js"></script>
  <script src="https://klassenkarte.de/kdm/js/kdm_edit.js"></script>
  <script src="https://klassenkarte.de/kdm/js/kdm_userinteraction.js"></script>
  <script src="https://klassenkarte.de/kdm/js/kdm_buttons.js"></script>
  <script src="https://klassenkarte.de/kdm/js/kdm_element.js"></script>
  <script src="https://klassenkarte.de/kdm/js/kdm_connection.js"></script>
  <script src="https://klassenkarte.de/kdm/js/kdm_anchor.js"></script>
  <script src="https://klassenkarte.de/kdm/js/kdm_menu.js"></script>
  <script src="https://klassenkarte.de/kdm/js/kdm_graphics.js"></script>
  <script src="https://klassenkarte.de/kdm/js/kdm_math.js"></script>
  <script src="https://klassenkarte.de/kdm/js/kdm_graph.js"></script>
  <script src="https://klassenkarte.de/kdm/js/kdm_routing.js"></script>

  <script>
    var canvas;
    var ctx;

    var classfillcolor = 'rgb(222,235,247)';
    var classstrokecolor = 'rgb(46,117,182)';
    var objectfillcolor = 'orange';
    var rhombfillcolor = 'rgb(153, 204, 0)';
    var erattributfillcolor = 'rgb(249,194,55)';

    var debugmsg = '1';
    var debugmode = false;
    var isTouch = isTouchDevice();
    var confCode = CODE_CLASS;
    var colormode = getOptionParameterFromUrl('colormode');
    var connectionmode = getOptionParameterFromUrl('connection');

    if (
      colormode !== null &&
      colormode === 'nocolor'
    ) {
      classfillcolor = 'white';
      classstrokecolor = 'black';
      objectfillcolor = 'white';
      rhombfillcolor = 'white';
      erattributfillcolor = 'white';
    }

    function createCanvas() {
      const canvasElement =
        document.createElement('canvas');

      canvasElement.style.position =
        'fixed';
      canvasElement.style.left =
        '0px';
      canvasElement.style.top =
        '0px';
      canvasElement.style.zIndex =
        1;
      canvasElement.style.backgroundColor =
        'lightyellow';
      canvasElement.style.touchAction =
        'manipulation';
      canvasElement.id =
        'canvas';

      canvasElement.addEventListener(
        'touchstart',
        handleStartTouch,
        false
      );

      canvasElement.addEventListener(
        'touchend',
        handleStopTouch,
        false
      );

      canvasElement.addEventListener(
        'touchcancel',
        handleStopTouch,
        false
      );

      canvasElement.addEventListener(
        'touchmove',
        handleTouchMoving,
        false
      );

      canvasElement.addEventListener(
        'click',
        handleClick
      );

      if (!isTouchDevice()) {
        canvasElement.addEventListener(
          'dblclick',
          handleDoubleClick
        );
      }

      document.body.appendChild(
        canvasElement
      );

      document.body.style.touchAction =
        'manipulation';

      return canvasElement;
    }

    function sizeCanvas() {
      if (canvas === undefined) {
        canvas =
          createCanvas();

        ctx =
          canvas.getContext('2d');
      }

      canvas.width =
        innerWidth;

      canvas.height =
        innerHeight;

      if (buttonList.length > 0) {
        RebuildControls();
      }

      draw();
    }

    function initGUI() {
      let y =
        10;

      const x =
        10;

      addButton(
        'cmdCreateClass',
        x,
        y,
        80,
        60,
        'https://klassenkarte.de/kdm/img/newclass.png',
        createClass
      );

      y +=
        70;

      addButton(
        'cmdDelete',
        x,
        y,
        80,
        60,
        'https://klassenkarte.de/kdm/img/delete.png',
        deleteModeEnabled
      );

      addButton(
        'cmdMenu',
        window.innerWidth - 90,
        10,
        80,
        60,
        'https://klassenkarte.de/kdm/img/hamburgermenu.png',
        menuCall
      );

      initMenu();
    }

    addEventListener(
      'resize',
      sizeCanvas
    );

    addEventListener(
      'mousedown',
      handleStartPress
    );

    addEventListener(
      'mouseup',
      handleStopPress
    );

    addEventListener(
      'mousemove',
      handleMoving
    );

    initGUI();
    sizeCanvas();
    selectedElementId = 0;
    uiState = 'start';
    preventUnload(true);
  </script>
</body>

</html>
